<!DOCTYPE html>

<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音符カード</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

```
<!-- メニューへ戻る -->
<button
    class="menu-button"
    onclick="location.href='index.html'">
    ← はじめにもどる
</button>

<!-- レベルボタン -->
<div class="buttons">

    <button class="lv1" onclick="setLevel(1)">
        ト音 ど-ど
    </button>

    <button class="lv2" onclick="setLevel(2)">
        ト音 ど-ど-ど
    </button>

    <button class="lv3" onclick="setLevel(3)">
        ヘ音 ど-ど
    </button>

    <button class="lv4" onclick="setLevel(4)">
        ヘ音 ど-ど-ど
    </button>

    <button class="lv5" onclick="setLevel(5)">
        ト音・ヘ音 MIX
    </button>

    <button class="lv6" onclick="setLevel(6)">
        3音 ド-ミ
    </button>

    <button class="lv7" onclick="setLevel(7)">
        3音 ド-ソ
    </button>

</div>

<!-- カードエリア -->
<div class="game-area">

    <div id="card"></div>

    <div id="progress">0 / 0</div>

    <!-- 前の問題 -->
    <button
        class="prev-button"
        onclick="showPreviousCard()">
        ← ひとつまえにもどる
    </button>

</div>

<script src="app.js"></script>
```

</body>
</html>
