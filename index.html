<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ピアノれんしゅう</title>

<style>

body{
    margin:0;

    background:linear-gradient(
        180deg,
        #fff6fb 0%,
        #fffdf7 100%
    );

    display:flex;
    justify-content:center;
    align-items:center;

    height:100vh;

    font-family:
    "Hiragino Maru Gothic ProN",
    "Yu Gothic",
    sans-serif;
}

.container{
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* タイトル */

.title{

    background:white;

    padding:20px 40px;

    border-radius:30px;

    margin-bottom:40px;

    font-size:42px;
    font-weight:bold;

    color:#ff7eb6;

    box-shadow:
        0 6px 15px rgba(0,0,0,0.08);

    text-align:center;
}

/* メニュー */

.menu{
    display:flex;
    flex-direction:column;
    gap:25px;
}

/* ボタン共通 */

.menu button{

    width:420px;
    height:95px;

    border:none;
    border-radius:30px;

    font-size:30px;
    font-weight:bold;

    color:white;

    cursor:pointer;

    transition:0.25s;

    box-shadow:
        0 8px 0 rgba(0,0,0,0.08),
        0 12px 24px rgba(0,0,0,0.10);
}

/* ホバー */

.menu button:hover{

    transform:
        translateY(-4px)
        scale(1.02);

    box-shadow:
        0 12px 0 rgba(0,0,0,0.07),
        0 18px 30px rgba(0,0,0,0.12);
}

/* 押した時 */

.menu button:active{

    transform:translateY(6px);

    box-shadow:
        0 2px 0 rgba(0,0,0,0.08),
        0 4px 10px rgba(0,0,0,0.10);
}

/* 音符カード */

.note{
    background:#9fd7ff;
}

/* 音のならび */

.scale{
    background:#d9b8ff;
}

/* 指のれんしゅう */

.finger{
    background:#ffb8d2;
}

</style>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffb8d2">

</head>

<body>

<div class="container">

    <div class="title">
        🎹 ピアノのれんしゅう 🎹
    </div>

    <div class="menu">

       <button
    class="note"
    onclick="location.href='note.html'">
    🎵 <ruby>音符<rt>おんぷ</rt></ruby>カード
</button>

<button
    class="scale"
    onclick="location.href='sound.html'">
    🎶 <ruby>音<rt>おと</rt></ruby>のならび
</button>

<button
    class="finger"
    onclick="location.href='finger.html'">
    🖐️ <ruby>指<rt>ゆび</rt></ruby>のれんしゅう
</button>

    </div>

</div>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>
</body>
</html>
